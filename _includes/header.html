<header class="main-header">
  {% include breadcrumbs.html %}

  <div class="header-actions">
    {% if site.obsidian.search.enabled != false %}
    <button
      class="search-trigger"
      data-action="open-search"
      aria-label="Search"
    >
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
      <span class="search-placeholder">Search notes...</span>
      <kbd class="search-shortcut">Ctrl+K</kbd>
    </button>
    {% endif %} {% if site.obsidian.graph.enabled %}
    <button
      class="header-btn"
      data-action="open-graph"
      aria-label="Graph view"
      title="Graph view"
    >
      <svg viewBox="0 0 24 24">
        <circle cx="5" cy="6" r="2.5" fill="currentColor" />
        <circle cx="19" cy="6" r="2.5" fill="currentColor" />
        <circle cx="12" cy="18" r="2.5" fill="currentColor" />
        <line
          x1="5"
          y1="6"
          x2="19"
          y2="6"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <line
          x1="5"
          y1="6"
          x2="12"
          y2="18"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <line
          x1="19"
          y1="6"
          x2="12"
          y2="18"
          stroke="currentColor"
          stroke-width="1.5"
        />
      </svg>
    </button>
    {% endif %}

    <button
      class="header-btn sidebar-right-toggle"
      data-action="toggle-sidebar-right"
      aria-label="Toggle right sidebar"
    >
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M3 3h18v18H3V3zm2 2v14h6V5H5zm8 0v14h6V5h-6z"
          opacity="0.5"
        />
        <path fill="currentColor" d="M15 5h4v14h-4V5z" />
      </svg>
    </button>
  </div>
</header>

<!-- Mobile header -->
<div class="mobile-header">
  <button
    class="mobile-menu-btn"
    data-action="toggle-sidebar-left"
    aria-label="Toggle sidebar"
  >
    <svg viewBox="0 0 24 24">
      <path
        fill="currentColor"
        d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"
      />
    </svg>
  </button>
  <div class="header-breadcrumb">{% include breadcrumbs.html %}</div>
  <div class="header-actions">
    {% if site.obsidian.search.enabled != false %}
    <button class="header-btn" data-action="open-search" aria-label="Search">
      <svg viewBox="0 0 24 24">
        <path
          fill="currentColor"
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        />
      </svg>
    </button>
    {% endif %}
  </div>
</div>
